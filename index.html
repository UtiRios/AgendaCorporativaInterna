<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agenda Corporativa Interna</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f4f6f9;
    margin:0;
    padding:15px;
}

h2{
    text-align:center;
    color:#1f2937;
}

.form-container{
    background:white;
    padding:15px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    margin-bottom:20px;
}

input{
    width:100%;
    padding:8px;
    margin:5px 0;
    border:1px solid #ccc;
    border-radius:6px;
}

button{
    padding:8px 12px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    margin-top:5px;
}

.btn-add{
    background:#2563eb;
    color:white;
}

.card{
    background:white;
    padding:12px;
    border-radius:8px;
    margin-bottom:12px;
    box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.actions{
    margin-top:8px;
}

.btn-whatsapp{
    background:#25D366;
    color:white;
    margin-right:5px;
}

.btn-call{
    background:#0ea5e9;
    color:white;
    margin-right:5px;
}

.btn-delete{
    background:#ef4444;
    color:white;
}
@media(min-width:768px){
    .grid{
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:10px;
    }
}
</style>
</head>
<body>

<h2>Agenda Corporativa Interna</h2>

<div class="form-container">
<div class="grid">
<input type="text" id="telefono" placeholder="Número o Extensión">
<input type="email" id="correo" placeholder="Correo electrónico">
<input type="text" id="nombre" placeholder="Nombre">
<input type="text" id="apellido" placeholder="Apellido">
<input type="text" id="puesto" placeholder="Puesto">
<input type="text" id="ubicacion" placeholder="Ubicación / Sala">
<input type="text" id="jefe" placeholder="Jefe inmediato">
</div>
<button class="btn-add" onclick="agregarContacto()">Agregar Contacto</button>
</div>

<div id="listaContactos"></div>

<script>

// CONTACTOS EMBEBIDOS EN EL ARCHIVO
let contactos = [
{
telefono:"55123456",
correo:"juan.perez@empresa.com",
nombre:"Juan",
apellido:"Pérez",
puesto:"Asesor Comercial",
ubicacion:"Sala Zona 9",
jefe:"Carlos López"
},
{
telefono:"22223333 ext 101",
correo:"ventas@empresa.com",
nombre:"Sala",
apellido:"Central",
puesto:"Recepción",
ubicacion:"Oficina Central",
jefe:"Gerencia Comercial"
}
];

function esCelular(numero){
let limpio = numero.replace(/\D/g,'');
return limpio.length===8 && /^[345]/.test(limpio);
}

function render(){
let contenedor=document.getElementById("listaContactos");
contenedor.innerHTML="";

contactos.forEach((c,index)=>{
let card=document.createElement("div");
card.className="card";

let acciones="";

if(esCelular(c.telefono)){
let numeroLimpio=c.telefono.replace(/\D/g,'');
acciones+=`<a href="https://wa.me/502${numeroLimpio}" target="_blank">
<button class="btn-whatsapp">WhatsApp</button></a>`;
}else{
acciones+=`<a href="tel:${c.telefono}">
<button class="btn-call">Llamar</button></a>`;
}

acciones+=`<button class="btn-delete" onclick="eliminar(${index})">Eliminar</button>`;

card.innerHTML=`
<strong>${c.nombre} ${c.apellido}</strong><br>
${c.puesto}<br>
📍 ${c.ubicacion}<br>
👔 Jefe: ${c.jefe}<br>
📞 ${c.telefono}<br>
✉ <a href="mailto:${c.correo}">${c.correo}</a>
<div class="actions">${acciones}</div>
`;

contenedor.appendChild(card);
});
}

function agregarContacto(){
let nuevo={
telefono:document.getElementById("telefono").value,
correo:document.getElementById("correo").value,
nombre:document.getElementById("nombre").value,
apellido:document.getElementById("apellido").value,
puesto:document.getElementById("puesto").value,
ubicacion:document.getElementById("ubicacion").value,
jefe:document.getElementById("jefe").value
};

if(!nuevo.nombre || !nuevo.telefono){
alert("Nombre y teléfono son obligatorios");
return;
}

contactos.push(nuevo);
render();
limpiarFormulario();
}

function eliminar(index){
contactos.splice(index,1);
render();
}

function limpiarFormulario(){
document.querySelectorAll("input").forEach(i=>i.value="");
}

render();

</script>

</body>
</html>
